<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول المهام الأسبوعي الدوري (تحديث الخميس)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #27ae60;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .current-week {
            text-align: center;
            color: #7f8c8d;
            font-size: 16px;
            margin-bottom: 25px;
            font-weight: bold;
            background: #e1f5fe;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            width: 100%;
            box-sizing: border-box;
        }

        /* قسم أسماء الأشخاص */
        .names-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        .names-section h3 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .inputs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .inputs-grid input {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            text-align: center;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #2980b9;
        }

        /* جدول المهام */
        .table-responsive {
            overflow-x: auto;
            background: var(--card-bg);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }

        th, td {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
        }

        tr:last-child td {
            border-bottom: none;
        }

        .person-tag {
            background-color: #ecf0f1;
            padding: 8px 15px;
            border-radius: 20px;
            display: inline-block;
            font-weight: bold;
            color: #2c3e50;
            min-width: 100px;
        }

        /* ألوان تمييز المهام */
        .task-ground { border-right: 5px solid #e74c3c; }
        .task-first { border-right: 5px solid #2ecc71; }
        .task-second { border-right: 5px solid #f1c40f; }
        .task-yard { border-right: 5px solid #9b59b6; }
    </style>
</head>
<body>

<div class="container">
    <h1>📅 جدول الأشغال الأسبوعي الدوري</h1>
    <div class="current-week" id="week-display">تحديث المداورة التلقائي: كل يوم خميس</div>

    <div class="names-section">
        <h3>👥 ترتيب الأشخاص الأساسي:</h3>
        <div class="inputs-grid">
            <input type="text" id="p1" value="أحمد" placeholder="الاسم الأول">
            <input type="text" id="p2" value="محمد" placeholder="الاسم الثاني">
            <input type="text" id="p3" value="خالد" placeholder="الاسم الثالث">
            <input type="text" id="p4" value="سلطان" placeholder="الاسم الرابع">
        </div>
        <button class="btn" onclick="updateNames()">حفظ الأسماء وتحديث المداورة</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th>اليوم</th>
                    <th class="task-ground">الدور الأرضي</th>
                    <th class="task-first">الدور الأول</th>
                    <th class="task-second">الدور الثاني</th>
                    <th class="task-yard">الحوش</th>
                </tr>
            </thead>
            <tbody id="schedule-body">
                </tbody>
        </table>
    </div>
</div>

<script>
    // تم ترتيب الأيام لتبدأ من الخميس نزولاً إلى الأربعاء لتتوافق مع دورتك الأسبوعية
    const days = ["الخميس", "الجمعة", "السبت", "الأحد", "الإثنين", "الثلاثاء", "الأربعاء"];
    
    // تحميل الأسماء من الذاكرة أو استخدام الافتراضية
    let savedNames = JSON.parse(localStorage.getItem('weeklyThursNames')) || ["أحمد", "محمد", "خالد", "سلطان"];

    // تعبئة حقول المدخلات عند الفتح
    document.getElementById('p1').value = savedNames[0];
    document.getElementById('p2').value = savedNames[1];
    document.getElementById('p3').value = savedNames[2];
    document.getElementById('p4').value = savedNames[3];

    // دالة تحسب كم "خميس" مر في تاريخ الويب لضمان الانتقال للأسبوع الجديد كل يوم خميس بدقة
    function getThursdayWeekCount() {
        const totalMs = new Date().getTime();
        // تقسيم الوقت على عدد الملّي ثانية في الأسبوع الواحد (604800000 ms) 
        // مع إزاحة لضبط نقطة التحول لتكون يوم الخميس تماماً
        const targetWeek = Math.floor((totalMs / 86400000 + 4) / 7);
        return targetWeek;
    }

    function renderTable() {
        const tbody = document.getElementById('schedule-body');
        tbody.innerHTML = "";

        const thursWeekIndex = getThursdayWeekCount();
        
        // عرض التنبيه للمستخدم لتأكيد عمل الأداة
        document.getElementById('week-display').innerText = `🔄 الجدول نشط | يتغير تسلسلياً تلقائياً كل يوم خميس مجرد دخول اليوم.`;

        days.forEach((day, dayIndex) => {
            let row = document.createElement('tr');
            
            // عمود اليوم
            let dayTd = document.createElement('td');
            dayTd.style.fontWeight = "bold";
            dayTd.innerText = day;
            row.appendChild(dayTd);

            // مصفوفة المهام الأربعة
            for (let taskIndex = 0; taskIndex < 4; taskIndex++) {
                let td = document.createElement('td');
                
                // المعادلة تعتمد على دورة الخميس الدورية لتبديل الأسماء 
                let personIndex = (thursWeekIndex + dayIndex + taskIndex) % 4;
                let assignedPerson = savedNames[personIndex] || `شخص ${personIndex + 1}`;

                td.innerHTML = `<span class="person-tag">${assignedPerson}</span>`;
                row.appendChild(td);
            }

            tbody.appendChild(row);
        });
    }

    function updateNames() {
        savedNames[0] = document.getElementById('p1').value || "أحمد";
        savedNames[1] = document.getElementById('p2').value || "محمد";
        savedNames[2] = document.getElementById('p3').value || "خالد";
        savedNames[3] = document.getElementById('p4').value || "سلطان";

        localStorage.setItem('weeklyThursNames', JSON.stringify(savedNames));
        renderTable();
        alert("تم التحديث! الجدول سيتغير تسلسلياً بشكل تلقائي كل يوم خميس.");
    }

    // التشغيل الفوري
    renderTable();
</script>

</body>
</html>
