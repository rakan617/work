<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الشغل الاسبوعي</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0369a1;
            --surface: rgba(255,255,255,0.92);
            --green-bg: rgba(220, 252, 231, 0.97);
            --green-border: #16a34a;
            --red-bg: rgba(254, 226, 226, 0.97);
            --red-border: #dc2626;
            --text: #1e293b;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px;
            background: linear-gradient(135deg, #0f2942 0%, #1a4a7a 40%, #0d3558 100%);
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(56,189,248,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(3,105,161,0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* ─── Header ─── */
        header { text-align: center; margin-bottom: 24px; }

        h1 {
            font-size: 30px;
            font-weight: 800;
            color: #fff;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
            margin-bottom: 16px;
        }

        /* ─── Month nav ─── */
        .month-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            font-size: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover { background: rgba(255,255,255,0.22); }
        .nav-btn:disabled { opacity: 0.3; cursor: default; }

        .month-badge {
            background: rgba(3,105,161,0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56,189,248,0.3);
            color: #fff;
            font-size: 17px;
            font-weight: 700;
            padding: 10px 28px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            min-width: 220px;
            text-align: center;
        }

        .archive-label {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: #7dd3fc;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* ─── Table ─── */
        .table-wrapper { overflow-x: auto; border-radius: 16px; }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 14px;
            min-width: 780px;
        }

        thead th {
            background: rgba(15,23,42,0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 700;
            padding: 14px 10px;
            text-align: center;
        }

        thead th:first-child { border-radius: 10px 0 0 10px; }
        thead th:last-child  { border-radius: 0 10px 10px 0; }

        /* ─── Date cell ─── */
        .date-cell {
            background: linear-gradient(135deg, rgba(3,105,161,0.92), rgba(2,79,120,0.92));
            color: #fff;
            text-align: center;
            vertical-align: middle;
            padding: 16px 12px;
            border-radius: 12px 0 0 12px;
            min-width: 128px;
            border: 1px solid rgba(56,189,248,0.25);
        }

        .date-cell .weekday { font-size: 12px; font-weight: 600; color: #7dd3fc; margin-bottom: 4px; }
        .date-cell .hijri-main { font-size: 26px; font-weight: 800; display: block; line-height: 1; }
        .date-cell .hijri-month { font-size: 13px; font-weight: 600; color: #bae6fd; display: block; margin-bottom: 6px; }
        .date-cell .greg-sub { font-size: 11px; color: rgba(186,230,253,0.65); display: block; border-top: 1px solid rgba(255,255,255,0.15); padding-top: 5px; }

        /* ─── Task cells ─── */
        td.task-cell {
            background: var(--surface);
            padding: 14px 10px;
            text-align: center;
            vertical-align: top;
            border: 1px solid rgba(203,213,225,0.4);
            border-right: none;
            transition: background 0.2s, border-color 0.2s;
            min-width: 150px;
        }

        td.task-cell:last-child { border-radius: 0 12px 12px 0; }
        td.task-cell.status-yes { background: var(--green-bg); border-color: var(--green-border); }
        td.task-cell.status-no  { background: var(--red-bg);   border-color: var(--red-border); }

        .task-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 0.7px;
            margin-bottom: 5px;
            padding-bottom: 5px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .person-name {
            display: block;
            font-size: 19px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 8px;
        }

        .status-yes .person-name { color: var(--green-border); }
        .status-no  .person-name { color: var(--red-border); }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 8px;
            min-height: 18px;
        }

        .status-yes .status-badge { background: #dcfce7; color: #15803d; }
        .status-no  .status-badge { background: #fee2e2; color: #b91c1c; }
        .status-none .status-badge { visibility: hidden; }

        /* ─── Buttons ─── */
        .actions { display: flex; justify-content: center; gap: 4px; flex-wrap: wrap; }

        .btn {
            padding: 5px 8px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn:hover  { opacity: 0.8; transform: translateY(-1px); }
        .btn:active { transform: scale(0.95); }

        /* في وضع الأرشيف نخفي الأزرار */
        .archive-mode .btn { display: none; }
        .archive-mode .status-badge { margin-bottom: 0; }

        .btn-yes  { background: #f0fdf4; color: #15803d; border-color: #16a34a; }
        .btn-no   { background: #fff1f2; color: #b91c1c; border-color: #dc2626; }
        .btn-swap { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; }

        /* Today highlight */
        tr.today-row .date-cell {
            background: linear-gradient(135deg, rgba(5,150,105,0.92), rgba(4,120,87,0.92));
        }
        tr.today-row .date-cell .weekday { color: #6ee7b7; }
        tr.today-row .date-cell .hijri-month { color: #a7f3d0; }

        /* ─── Bottom bar ─── */
        .bottom-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn-reset {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.55);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 22px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-reset:hover { background: rgba(239,68,68,0.2); color: #fca5a5; border-color: #fca5a5; }

        /* ─── Archive banner ─── */
        .archive-banner {
            display: none;
            background: rgba(234,179,8,0.15);
            border: 1px solid rgba(234,179,8,0.35);
            color: #fde68a;
            text-align: center;
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 16px;
        }

        .archive-banner.visible { display: block; }

        /* ─── Swap modal ─── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            min-width: 280px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal h3 { font-size: 18px; color: var(--primary); margin-bottom: 6px; }
        .modal p  { font-size: 14px; color: var(--muted); margin-bottom: 18px; }

        .modal-names { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

        .btn-name {
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            color: var(--primary);
        }

        .btn-name:hover { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }

        .btn-cancel {
            background: #f1f5f9;
            color: var(--muted);
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            h1 { font-size: 20px; }
            .month-badge { font-size: 14px; padding: 8px 16px; min-width: 160px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🗓️ جدول الشغل الأسبوعي</h1>

        <div class="month-nav">
            <button class="nav-btn" id="btn-prev" onclick="changeMonth(-1)" title="الشهر السابق">&#8250;</button>
            <div class="month-badge">
                <span id="month-display">🌙 جاري التحميل...</span>
                <span class="archive-label" id="archive-label"></span>
            </div>
            <button class="nav-btn" id="btn-next" onclick="changeMonth(1)" title="الشهر التالي" disabled>&#8249;</button>
        </div>
    </header>

    <div class="archive-banner" id="archive-banner">
        📦 أنت تعرض أرشيف شهر سابق — للتعديل ارجع للشهر الحالي
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>📅 التاريخ</th>
                    <th>🏠 الدور الأرضي</th>
                    <th>1️⃣ الدور الأول</th>
                    <th>2️⃣ الدور الثاني</th>
                    <th>🌿 الحوش</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="bottom-bar">
        <button class="btn-reset" id="reset-btn" onclick="confirmReset()">🔄 إعادة تعيين الشهر الحالي</button>
    </div>
</div>

<!-- Swap Modal -->
<div class="modal-overlay" id="swap-modal">
    <div class="modal">
        <h3>🔄 تبديل الشخص</h3>
        <p id="swap-desc">اختر مع مين تبدل</p>
        <div class="modal-names" id="swap-options"></div>
        <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    const defaultNames = ["شوق", "محمد", "فارس", "راكان"];
    const taskLabels   = ["الارضي", "تنظيف العصافير", "الدرج والسطح والمصعد", "الملحق والشارع"];

    // مرساة: أسبوع 3 محرم 1447
    // الترتيب: [أرضي=شوق(0), أول=راكان(3), ثاني=فارس(2), حوش=محمد(1)]
    const ANCHOR_ORDER = [0, 3, 2, 1];
    const ANCHOR_DATE  = new Date(2026, 5, 18); // خميس 3 محرم 1448 = 18 يونيو 2026

    // ─── الشهر المعروض حالياً (0 = الحالي، -1 = السابق ...) ───
    let monthOffset = 0;

    // ─── دوال هجري ────────────────────────────────────────────────────────
    function getHijriParts(date) {
        const fmt = new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', {
            day: 'numeric', month: 'numeric', year: 'numeric'
        });
        const parts = fmt.formatToParts(date);
        const get = t => parseInt(parts.find(p => p.type === t).value);
        return { day: get('day'), month: get('month'), year: get('year') };
    }

    function hijriMonthName(date) {
        return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { month: 'long' }).format(date);
    }

    function hijriMonthYearStr(date) {
        return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { month: 'long', year: 'numeric' }).format(date);
    }

    function gregStr(date) {
        return new Intl.DateTimeFormat('ar-SA', { day: 'numeric', month: 'long', year: 'numeric' }).format(date);
    }

    // ─── الحصول على تاريخ يمثل الشهر المطلوب (بعد إضافة offset هجري) ───
    function getTargetMonthDate() {
        // نبدأ من اليوم ونزيح شهوراً هجرية
        const today = new Date();
        if (monthOffset === 0) return today;

        // نأخذ أجزاء الهجري ونعدل الشهر
        const { day, month, year } = getHijriParts(today);
        let newMonth = month + monthOffset;
        let newYear  = year;

        while (newMonth > 12) { newMonth -= 12; newYear++; }
        while (newMonth < 1)  { newMonth += 12; newYear--; }

        // نبحث عن تاريخ ميلادي يقع في هذا الشهر الهجري
        // نجرب يوم 15 من نفس الشهر الميلادي تقريباً
        const approxMs = today.getTime() + monthOffset * 30 * 24 * 60 * 60 * 1000;
        const approx = new Date(approxMs);

        // نضبطه: نبحث عن يوم في الشهر الهجري الصح
        for (let delta = -35; delta <= 35; delta++) {
            const test = new Date(approx);
            test.setDate(test.getDate() + delta);
            const p = getHijriParts(test);
            if (p.month === newMonth && p.year === newYear) return test;
        }

        return approx;
    }

    // ─── أيام الخميس في شهر هجري معين ───────────────────────────────────
    function getThursdaysOfHijriMonthFor(refDate) {
        const { month: hm, year: hy } = getHijriParts(refDate);

        const start = new Date(refDate);
        start.setDate(start.getDate() - 45);

        const thursdays = [];
        const cur = new Date(start);

        for (let i = 0; i < 120; i++) {
            if (cur.getDay() === 4) {
                const p = getHijriParts(cur);
                if (p.year === hy && p.month === hm) {
                    thursdays.push(new Date(cur));
                }
            }
            cur.setDate(cur.getDate() + 1);
        }

        return thursdays;
    }

    // ─── مفتاح التخزين ────────────────────────────────────────────────────
    function weekKey(thursday) {
        return `ws4_${thursday.getFullYear()}_${thursday.getMonth()}_${thursday.getDate()}`;
    }

    // ─── دوران المهام ─────────────────────────────────────────────────────
    function getWeeksSinceAnchor(thursday) {
        return Math.round((thursday.getTime() - ANCHOR_DATE.getTime()) / (7*24*60*60*1000));
    }

    function getDefaultTasksForWeek(thursday) {
        const w = getWeeksSinceAnchor(thursday);
        // نبني قائمة الأسماء حسب ترتيب المرساة
        const anchorNames = ANCHOR_ORDER.map(i => defaultNames[i]);
        // كل أسبوع الكل يتقدم خطوة: الأرضي→الأول→الثاني→الحوش→الأرضي
        return anchorNames.map((_, col) => anchorNames[((col - w + 1) % 4 + 4) % 4]);
    }

    // ─── رسم الجدول ───────────────────────────────────────────────────────
    function initTable() {
        const today = new Date();
        today.setHours(0,0,0,0);

        const isArchive = monthOffset !== 0;
        const refDate   = getTargetMonthDate();
        const thursdays = getThursdaysOfHijriMonthFor(refDate);

        // عنوان الشهر
        const midDate = thursdays.length > 0
            ? thursdays[Math.floor(thursdays.length / 2)]
            : refDate;

        document.getElementById('month-display').textContent = '🌙 أشغال شهر ' + hijriMonthYearStr(midDate);
        document.getElementById('archive-label').textContent = isArchive ? '📦 أرشيف' : '';

        // بانر الأرشيف
        document.getElementById('archive-banner').classList.toggle('visible', isArchive);

        // زر الإعادة
        document.getElementById('reset-btn').style.display = isArchive ? 'none' : '';

        // سهم التالي: محجوب لما نكون في الشهر الحالي
        document.getElementById('btn-next').disabled = monthOffset >= 0;

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        thursdays.forEach(thursday => {
            thursday.setHours(0,0,0,0);
            const key = weekKey(thursday);

            let data = null;
            try { data = JSON.parse(localStorage.getItem(key)); } catch(e) {}
            if (!data) {
                data = { tasks: getDefaultTasksForWeek(thursday), status: ['','','',''] };
                if (!isArchive) localStorage.setItem(key, JSON.stringify(data));
            }

            const isToday = thursday.getTime() === today.getTime();
            const { day: hDay, year: hYear } = getHijriParts(thursday);
            const hMonth = hijriMonthName(thursday);
            const gStr   = gregStr(thursday);

            const tr = document.createElement('tr');
            if (isToday) tr.classList.add('today-row');

            // خلية التاريخ
            const dateTd = document.createElement('td');
            dateTd.className = 'date-cell';
            dateTd.innerHTML = `
                <div class="weekday">الخميس${isToday ? ' ◄ اليوم' : ''}</div>
                <span class="hijri-main">${hDay}</span>
                <span class="hijri-month">${hMonth} ${hYear}هـ</span>
                <span class="greg-sub">${gStr}</span>
            `;
            tr.appendChild(dateTd);

            // خلايا المهام
            for (let i = 0; i < 4; i++) {
                const td = document.createElement('td');
                td.className = 'task-cell' + (isArchive ? ' archive-mode' : '');
                const st = data.status[i];
                if (st === 'yes') td.classList.add('status-yes');
                else if (st === 'no') td.classList.add('status-no');
                else td.classList.add('status-none');

                const statusText = st === 'yes' ? '✅ اشتغل' : st === 'no' ? '❌ عجاز' : '';

                td.innerHTML = `
                    <span class="task-label">${taskLabels[i]}</span>
                    <span class="person-name">${data.tasks[i]}</span>
                    <span class="status-badge">${statusText || '&nbsp;'}</span>
                    <div class="actions">
                        <button class="btn btn-yes"  onclick="setStatus('${key}',${i},'yes')">✅ اشتغل</button>
                        <button class="btn btn-no"   onclick="setStatus('${key}',${i},'no')">❌ عجاز</button>
                        <button class="btn btn-swap" onclick="openSwap('${key}',${i},'${data.tasks[i]}')">🔄 بدل</button>
                    </div>
                `;
                tr.appendChild(td);
            }

            tbody.appendChild(tr);
        });
    }

    // ─── التنقل بين الأشهر ────────────────────────────────────────────────
    function changeMonth(dir) {
        monthOffset += dir;
        if (monthOffset > 0) monthOffset = 0;
        initTable();
    }

    // ─── تغيير الحالة ─────────────────────────────────────────────────────
    function setStatus(key, i, type) {
        let data = JSON.parse(localStorage.getItem(key)) || { tasks: [], status: ['','','',''] };
        data.status[i] = data.status[i] === type ? '' : type;
        localStorage.setItem(key, JSON.stringify(data));
        initTable();
    }

    // ─── نافذة التبديل ────────────────────────────────────────────────────
    let swapState = null;

    function openSwap(key, i, currentPerson) {
        const data = JSON.parse(localStorage.getItem(key));
        if (!data) return;
        swapState = { key, i };
        document.getElementById('swap-desc').textContent = `تبديل "${currentPerson}" مع:`;
        const opts = document.getElementById('swap-options');
        opts.innerHTML = '';
        data.tasks.forEach((name, j) => {
            if (j === i) return;
            const btn = document.createElement('button');
            btn.className = 'btn-name';
            btn.textContent = name;
            btn.onclick = () => doSwap(j);
            opts.appendChild(btn);
        });
        document.getElementById('swap-modal').classList.add('open');
    }

    function doSwap(j) {
        const { key, i } = swapState;
        let data = JSON.parse(localStorage.getItem(key));
        [data.tasks[i], data.tasks[j]] = [data.tasks[j], data.tasks[i]];
        [data.status[i], data.status[j]] = [data.status[j], data.status[i]];
        localStorage.setItem(key, JSON.stringify(data));
        closeModal();
        initTable();
    }

    function closeModal() {
        document.getElementById('swap-modal').classList.remove('open');
        swapState = null;
    }

    // ─── إعادة تعيين الشهر الحالي فقط ───────────────────────────────────
    function confirmReset() {
        if (confirm('هل تبغى تمسح تعديلات الشهر الحالي وترجع للجدول الافتراضي؟')) {
            const refDate   = getTargetMonthDate();
            const thursdays = getThursdaysOfHijriMonthFor(refDate);
            thursdays.forEach(t => localStorage.removeItem(weekKey(t)));
            initTable();
        }
    }

    document.getElementById('swap-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    initTable();
</script>

</body>
</html>
