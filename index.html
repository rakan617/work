<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جدول الخميس</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
font-family:Tahoma;
background:#f4f6f7;
margin:0;
padding:20px;
transition:.3s;
}

.dark{
background:#1c1c1c;
color:#fff;
}

.box{
background:#fff;
padding:15px;
margin:10px 0;
border-radius:10px;
}

.dark .box{
background:#2a2a2a;
}

table{
width:100%;
border-collapse:collapse;
text-align:center;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
}

th{background:#2c3e50;color:#fff;}

.tag{
background:#e8f8f5;
padding:5px 10px;
border-radius:20px;
display:inline-block;
}
</style>
</head>

<body>

<h2>📅 جدول الخميس</h2>

<div class="box">
<div id="hijri"></div>
<div id="next"></div>
</div>

<div class="box">
<h3>👥 الأشخاص (مقفل)</h3>
<p>الأرضي: شوق</p>
<p>الأول: محمد</p>
<p>الثاني: فارس</p>
<p>الحوش: راكان</p>
</div>

<div class="box">
<button onclick="toggle()">🌙</button>
</div>

<div class="box">
<table>
<tr>
<th>أرضي</th>
<th>أول</th>
<th>ثاني</th>
<th>حوش</th>
</tr>
<tr>
<td id="t0"></td>
<td id="t1"></td>
<td id="t2"></td>
<td id="t3"></td>
</tr>
</table>
</div>

<div class="box">
<h3>📜 التاريخ</h3>
<table>
<thead>
<tr>
<th>التاريخ</th>
<th>أرضي</th>
<th>أول</th>
<th>ثاني</th>
<th>حوش</th>
</tr>
</thead>
<tbody id="history"></tbody>
</table>
</div>

<script>

/* 🔥 FIREBASE (PUT YOUR INFO HERE) */
const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID",
storageBucket: "YOUR_BUCKET",
messagingSenderId: "XXXX",
appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* 🔒 LOCKED NAMES */
let saved = ["شوق","محمد","فارس","راكان"];

/* WEEK CALC */
function getWeek(){
let start=new Date("2025-01-02");
let now=new Date();
return Math.floor((now-start)/(1000*60*60*24*7));
}

/* LOAD CLOUD */
async function load(){

const doc = await db.collection("schedule")
.doc("thursday").get();

if(doc.exists){
saved = doc.data().names;
}

render();
}

/* SAVE CLOUD */
function saveCloud(){
db.collection("schedule")
.doc("thursday")
.set({
names:saved,
updated:new Date()
});
}

/* RENDER */
function render(){

let w=getWeek();

/* TASKS */
t0.innerHTML=`<span class="tag">${saved[(w)%4]}</span>`;
t1.innerHTML=`<span class="tag">${saved[(w+1)%4]}</span>`;
t2.innerHTML=`<span class="tag">${saved[(w+2)%4]}</span>`;
t3.innerHTML=`<span class="tag">${saved[(w+3)%4]}</span>`;

/* HIJRI */
let today=new Date();

let hijri=new Intl.DateTimeFormat(
"ar-SA-u-ca-islamic-umalqura",
{day:"numeric",month:"long",year:"numeric"}
).format(today);

document.getElementById("hijri").innerText =
"📆 الهجري: " + hijri;

/* NEXT THURSDAY */
let next=new Date(today);
while(next.getDay()!=4) next.setDate(next.getDate()+1);

let nextHijri=new Intl.DateTimeFormat(
"ar-SA-u-ca-islamic-umalqura",
{day:"numeric",month:"long",year:"numeric"}
).format(next);

document.getElementById("next").innerText =
"📅 التغيير القادم: " + nextHijri;

/* HISTORY */
renderHistory(w);
}

/* HISTORY */
function renderHistory(current){

let html="";

for(let i=0;i<10;i++){

let w=current-i;
let d=new Date();
d.setDate(d.getDate()-i*7);

let hij=new Intl.DateTimeFormat(
"ar-SA-u-ca-islamic-umalqura",
{day:"numeric",month:"long",year:"numeric"}
).format(d);

html+=`
<tr>
<td>${hij}</td>
<td>${saved[(w)%4]}</td>
<td>${saved[(w+1)%4]}</td>
<td>${saved[(w+2)%4]}</td>
<td>${saved[(w+3)%4]}</td>
</tr>`;
}

history.innerHTML=html;
}

/* DARK MODE */
function toggle(){
document.body.classList.toggle("dark");
}

/* START */
load();

</script>

</body>
</html>
