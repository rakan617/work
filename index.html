<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الشغل الاسبوعي</title>
    <style>
        :root {
            --primary: #0f172a;
            --accent: #0369a1;
            --accent-light: #38bdf8;
            --surface: rgba(255,255,255,0.92);
            --surface-blur: rgba(255,255,255,0.6);
            --green-bg: rgba(220, 252, 231, 0.97);
            --green-border: #16a34a;
            --red-bg: rgba(254, 226, 226, 0.97);
            --red-border: #dc2626;
            --text: #1e293b;
            --muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            min-height: 100vh;
            padding: 24px 16px;
            background: linear-gradient(135deg, #0f2942 0%, #1a4a7a 40%, #0d3558 100%);
            background-attachment: fixed;
        }

        /* Starfield/pattern overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(56, 189, 248, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(3, 105, 161, 0.15) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1300px;
            margin: 0 auto;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 28px;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #fff;
            letter-spacing: 1px;
            text-shadow: 0 2px 12px rgba(0,0,0,0.5);
            margin-bottom: 12px;
        }

        .month-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(3, 105, 161, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(56, 189, 248, 0.3);
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            padding: 10px 28px;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        /* Table wrapper */
        .table-wrapper {
            overflow-x: auto;
            border-radius: 16px;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 14px;
            min-width: 780px;
        }

        thead th {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #e2e8f0;
            font-size: 15px;
            font-weight: 700;
            padding: 14px 10px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        thead th:first-child { border-radius: 10px 0 0 10px; }
        thead th:last-child  { border-radius: 0 10px 10px 0; }

        /* Date cell */
        .date-cell {
            background: linear-gradient(135deg, rgba(3, 105, 161, 0.92), rgba(2, 79, 120, 0.92));
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: #fff;
            text-align: center;
            vertical-align: middle;
            padding: 18px 14px;
            border-radius: 12px 0 0 12px;
            min-width: 130px;
            border: 1px solid rgba(56, 189, 248, 0.25);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .date-cell .weekday {
            font-size: 13px;
            font-weight: 600;
            color: #7dd3fc;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .date-cell .hijri-main {
            font-size: 22px;
            font-weight: 800;
            display: block;
            line-height: 1.1;
        }

        .date-cell .hijri-month {
            font-size: 14px;
            font-weight: 600;
            color: #bae6fd;
            display: block;
            margin-bottom: 8px;
        }

        .date-cell .greg-sub {
            font-size: 11px;
            color: rgba(186, 230, 253, 0.7);
            display: block;
            border-top: 1px solid rgba(255,255,255,0.15);
            padding-top: 6px;
            margin-top: 2px;
        }

        /* Task cells */
        td.task-cell {
            background: var(--surface);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 16px 10px;
            text-align: center;
            vertical-align: top;
            border: 1px solid rgba(203, 213, 225, 0.4);
            border-right: none;
            transition: background 0.25s, border-color 0.25s, box-shadow 0.25s;
            min-width: 150px;
        }

        td.task-cell:last-child {
            border-radius: 0 12px 12px 0;
        }

        td.task-cell.status-yes {
            background: var(--green-bg);
            border-color: var(--green-border);
        }

        td.task-cell.status-no {
            background: var(--red-bg);
            border-color: var(--red-border);
        }

        .task-label {
            display: block;
            font-size: 10px;
            font-weight: 600;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
            padding-bottom: 6px;
            border-bottom: 1px dashed #e2e8f0;
        }

        .person-name {
            display: block;
            font-size: 20px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 12px;
        }

        .status-yes .person-name { color: var(--green-border); }
        .status-no  .person-name { color: var(--red-border); }

        .status-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
            min-height: 20px;
        }

        .status-yes .status-badge { background: #dcfce7; color: #15803d; }
        .status-no  .status-badge { background: #fee2e2; color: #b91c1c; }
        .status-none .status-badge { background: transparent; color: transparent; }

        /* Buttons */
        .actions {
            display: flex;
            justify-content: center;
            gap: 5px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 5px 9px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            border: 1.5px solid transparent;
            transition: all 0.15s;
            font-family: inherit;
        }

        .btn:hover  { opacity: 0.8; transform: translateY(-1px); }
        .btn:active { transform: scale(0.95); }

        .btn-yes  { background: #f0fdf4; color: #15803d; border-color: #16a34a; }
        .btn-no   { background: #fff1f2; color: #b91c1c; border-color: #dc2626; }
        .btn-swap { background: #eff6ff; color: #1d4ed8; border-color: #3b82f6; }

        /* Today highlight */
        tr.today-row .date-cell {
            background: linear-gradient(135deg, rgba(5, 150, 105, 0.92), rgba(4, 120, 87, 0.92));
        }

        tr.today-row .date-cell .weekday { color: #6ee7b7; }
        tr.today-row .date-cell .hijri-month { color: #a7f3d0; }

        /* Reset button */
        .reset-area {
            text-align: center;
            margin-top: 24px;
        }

        .btn-reset {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            color: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.15);
            padding: 8px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .btn-reset:hover { background: rgba(239,68,68,0.2); color: #fca5a5; border-color: #fca5a5; }

        /* Swap modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            min-width: 280px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal h3 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 6px;
        }

        .modal p {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 18px;
        }

        .modal-names {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn-name {
            padding: 12px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 10px;
            border: 2px solid #e2e8f0;
            background: #f8fafc;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
            color: var(--primary);
        }

        .btn-name:hover { background: #eff6ff; border-color: #3b82f6; color: #1d4ed8; }

        .btn-cancel {
            background: #f1f5f9;
            color: var(--muted);
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
        }

        @media (max-width: 640px) {
            h1 { font-size: 22px; }
            .month-badge { font-size: 14px; padding: 8px 18px; }
            .person-name { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🗓️ جدول الشغل الأسبوعي</h1>
        <div class="month-badge" id="month-display">🌙 جاري التحميل...</div>
    </header>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>📅 التاريخ</th>
                    <th>🏠 الدور الأرضي</th>
                    <th>1️⃣ الدور الأول</th>
                    <th>2️⃣ الدور الثاني</th>
                    <th>🌿 الحوش</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div class="reset-area">
        <button class="btn-reset" onclick="confirmReset()">🔄 إعادة تعيين الجدول</button>
    </div>
</div>

<!-- Swap Modal -->
<div class="modal-overlay" id="swap-modal">
    <div class="modal">
        <h3>🔄 تبديل الشخص</h3>
        <p id="swap-desc">اختر مع مين تبدل</p>
        <div class="modal-names" id="swap-options"></div>
        <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
    </div>
</div>

<script>
    // ─── إعدادات الأسماء والمهام ───────────────────────────────────────────
    const defaultNames = ["شوق", "محمد", "فارس", "راكان"];
    const taskLabels   = ["الارضي", "تنظيف العصافير", "الدرج والسطح والمصعد", "الملحق والشارع"];

    // ترتيب بداية ١٠ محرم: الارضي=محمد، الاول=شوق، الثاني=راكان، الحوش=فارس
    // محمد(1) شوق(0) راكان(3) فارس(2)
    const ANCHOR_ORDER = [1, 0, 3, 2]; // indexes into defaultNames

    // تاريخ البداية: أول خميس في محرم اللي يوافق ٨ أو ٩ محرم أو ما بعده
    // نستخدم بذور ثابتة: خميس 10 محرم 1447 → نحسبها
    // 10 محرم 1447 → 4 يوليو 2025 (الجمعة) → أقرب خميس هو 3 يوليو 2025
    // بس المهم نحسب wIndex بالنسبة لذلك التاريخ المرجعي
    const ANCHOR_DATE = new Date(2025, 6, 3); // 3 يوليو 2025 (خميس أسبوع 10 محرم)

    // ─── دوال التاريخ الهجري ──────────────────────────────────────────────
    function toHijri(date) {
        return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
            day: 'numeric', month: 'long', year: 'numeric'
        }).format(date);
    }

    function toHijriShort(date) {
        return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
            day: 'numeric', month: 'short'
        }).format(date);
    }

    function toHijriMonthYear(date) {
        return new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', {
            month: 'long', year: 'numeric'
        }).format(date);
    }

    function toGreg(date) {
        return new Intl.DateTimeFormat('ar-SA', {
            day: 'numeric', month: 'long', year: 'numeric'
        }).format(date);
    }

    function getHijriDay(date) {
        return parseInt(new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { day: 'numeric' }).format(date));
    }

    function getHijriMonthNum(date) {
        return parseInt(new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { month: 'numeric' }).format(date));
    }

    function getHijriYear(date) {
        return parseInt(new Intl.DateTimeFormat('en-u-ca-islamic-umalqura', { year: 'numeric' }).format(date));
    }

    // ─── حساب ترتيب المهام حسب الأسابيع منذ المرساة ──────────────────────
    function getWeeksSinceAnchor(thursday) {
        const msPerWeek = 7 * 24 * 60 * 60 * 1000;
        const anchorTime = ANCHOR_DATE.getTime();
        const thurTime   = thursday.getTime();
        return Math.round((thurTime - anchorTime) / msPerWeek);
    }

    function getDefaultTasksForWeek(thursday) {
        const weeks = getWeeksSinceAnchor(thursday);
        return ANCHOR_ORDER.map((anchorIdx, col) => {
            const rotated = (anchorIdx + weeks) % 4;
            return defaultNames[(rotated + 4) % 4];
        });
    }

    // مفتاح التخزين
    function weekKey(thursday) {
        const y = thursday.getFullYear();
        const m = thursday.getMonth();
        const d = thursday.getDate();
        return `workschedule_v3_${y}_${m}_${d}`;
    }

    // ─── جمع أيام الخميس في الشهر الهجري الحالي ─────────────────────────
    function getThursdaysOfHijriMonth() {
        const today = new Date();
        const currentHijriMonth = getHijriMonthNum(today);
        const currentHijriYear  = getHijriYear(today);

        // نمشي من أول الشهر الميلادي المقابل ونبحث عن خمسات تقع في نفس الشهر الهجري
        // نبدأ من 60 يوم قبل اليوم ونمشي 90 يوم للأمام
        const start = new Date(today);
        start.setDate(start.getDate() - 60);

        const thursdays = [];
        const cur = new Date(start);

        while (thursdays.length === 0 || getHijriMonthNum(cur) === currentHijriMonth) {
            if (cur.getDay() === 4) { // خميس
                const hm = getHijriMonthNum(cur);
                const hy = getHijriYear(cur);
                if (hy === currentHijriYear && hm === currentHijriMonth) {
                    thursdays.push(new Date(cur));
                } else if (thursdays.length > 0) {
                    break;
                }
            }
            cur.setDate(cur.getDate() + 1);
            // حماية من loop لا نهائي
            if (Math.abs(cur - today) > 120 * 24 * 60 * 60 * 1000) break;
        }

        return thursdays;
    }

    // ─── رسم الجدول ──────────────────────────────────────────────────────
    function initTable() {
        const today = new Date();
        today.setHours(0,0,0,0);

        const thursdays = getThursdaysOfHijriMonth();
        
        // عنوان الشهر الهجري
        if (thursdays.length > 0) {
            const midDate = thursdays[Math.floor(thursdays.length / 2)];
            document.getElementById('month-display').textContent =
                '🌙 أشغال شهر ' + toHijriMonthYear(midDate);
        }

        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        thursdays.forEach(thursday => {
            const key = weekKey(thursday);
            thursday.setHours(0,0,0,0);

            // تحميل أو إنشاء البيانات
            let data = null;
            try { data = JSON.parse(localStorage.getItem(key)); } catch(e) {}
            if (!data) {
                data = {
                    tasks: getDefaultTasksForWeek(thursday),
                    status: ['', '', '', '']
                };
                localStorage.setItem(key, JSON.stringify(data));
            }

            const isToday = thursday.getTime() === today.getTime();

            // بناء الصف
            const tr = document.createElement('tr');
            if (isToday) tr.classList.add('today-row');

            // خلية التاريخ
            const hijriDay   = getHijriDay(thursday);
            const hijriMonth = new Intl.DateTimeFormat('ar-SA-u-ca-islamic-umalqura', { month: 'long' }).format(thursday);
            const hijriYear  = getHijriYear(thursday);
            const gregStr    = toGreg(thursday);

            const dateTd = document.createElement('td');
            dateTd.className = 'date-cell';
            dateTd.innerHTML = `
                <div class="weekday">الخميس${isToday ? ' ← اليوم' : ''}</div>
                <span class="hijri-main">${hijriDay}</span>
                <span class="hijri-month">${hijriMonth} ${hijriYear}هـ</span>
                <span class="greg-sub">${gregStr}</span>
            `;
            tr.appendChild(dateTd);

            // خلايا المهام
            for (let i = 0; i < 4; i++) {
                const td = document.createElement('td');
                td.className = 'task-cell';
                const st = data.status[i];
                if (st === 'yes') td.classList.add('status-yes');
                else if (st === 'no') td.classList.add('status-no');
                else td.classList.add('status-none');

                const statusText = st === 'yes' ? '✅ اشتغل' : st === 'no' ? '❌ عجاز' : '';

                td.innerHTML = `
                    <span class="task-label">${taskLabels[i]}</span>
                    <span class="person-name">${data.tasks[i]}</span>
                    <span class="status-badge">${statusText}</span>
                    <div class="actions">
                        <button class="btn btn-yes"  onclick="setStatus('${key}', ${i}, 'yes')">✅ اشتغل</button>
                        <button class="btn btn-no"   onclick="setStatus('${key}', ${i}, 'no')">❌ عجاز</button>
                        <button class="btn btn-swap" onclick="openSwap('${key}', ${i}, '${data.tasks[i]}')">🔄 بدل</button>
                    </div>
                `;
                tr.appendChild(td);
            }

            tbody.appendChild(tr);
        });
    }

    // ─── تغيير الحالة ─────────────────────────────────────────────────────
    function setStatus(key, i, type) {
        let data = JSON.parse(localStorage.getItem(key));
        data.status[i] = data.status[i] === type ? '' : type;
        localStorage.setItem(key, JSON.stringify(data));
        initTable();
    }

    // ─── نافذة التبديل ───────────────────────────────────────────────────
    let swapState = null;

    function openSwap(key, i, currentPerson) {
        const data = JSON.parse(localStorage.getItem(key));
        swapState = { key, i };
        document.getElementById('swap-desc').textContent = `تبديل "${currentPerson}" مع:`;

        const opts = document.getElementById('swap-options');
        opts.innerHTML = '';
        data.tasks.forEach((name, j) => {
            if (j === i) return;
            const btn = document.createElement('button');
            btn.className = 'btn-name';
            btn.textContent = name;
            btn.onclick = () => doSwap(j);
            opts.appendChild(btn);
        });

        document.getElementById('swap-modal').classList.add('open');
    }

    function doSwap(j) {
        const { key, i } = swapState;
        let data = JSON.parse(localStorage.getItem(key));
        [data.tasks[i], data.tasks[j]] = [data.tasks[j], data.tasks[i]];
        [data.status[i], data.status[j]] = [data.status[j], data.status[i]];
        localStorage.setItem(key, JSON.stringify(data));
        closeModal();
        initTable();
    }

    function closeModal() {
        document.getElementById('swap-modal').classList.remove('open');
        swapState = null;
    }

    // ─── إعادة تعيين ─────────────────────────────────────────────────────
    function confirmReset() {
        if (confirm('هل تبغى تمسح كل التعديلات وترجع للجدول الافتراضي؟')) {
            // حذف مفاتيح الأسبوع فقط
            Object.keys(localStorage)
                .filter(k => k.startsWith('workschedule_v3_'))
                .forEach(k => localStorage.removeItem(k));
            initTable();
        }
    }

    // إغلاق الموديل بالضغط خارجه
    document.getElementById('swap-modal').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    // ─── تشغيل ────────────────────────────────────────────────────────────
    initTable();
</script>

</body>
</html>
